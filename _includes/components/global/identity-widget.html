<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
(function () {
  if (!window.netlifyIdentity) return;

  function updateIdentityUI(user) {
    document.querySelectorAll("[data-identity-name]").forEach(function (el) {
      el.textContent = user
        ? (user.user_metadata && user.user_metadata.full_name) || user.email
        : "";
    });
    document.querySelectorAll("[data-identity-logged-in]").forEach(function (el) {
      el.hidden = !user;
    });
    document.querySelectorAll("[data-identity-logged-out]").forEach(function (el) {
      el.hidden = !!user;
    });

    // The widget only keeps the session in localStorage — it does NOT set a
    // cookie on its own. Our Edge Function (netlify/edge-functions/members-gate.js)
    // checks a cookie to protect /members/* at the edge, so we have to write
    // it ourselves here, or every request looks logged-out to the server no
    // matter what the widget shows client-side.
    if (user && user.token && user.token.access_token) {
      var maxAge = user.token.expires_in || 3600;
      document.cookie = "nf_jwt=" + user.token.access_token + "; path=/; max-age=" + maxAge + "; SameSite=Lax";
    } else {
      document.cookie = "nf_jwt=; path=/; max-age=0";
    }
  }

  // Invite / password-recovery / confirmation emails land on the site with a
  // token in the URL hash. Without this, the widget never opens automatically
  // and the link just drops the visitor on the homepage.
  if (/invite_token|recovery_token|confirmation_token/.test(window.location.hash)) {
    window.netlifyIdentity.on("init", function () {
      window.netlifyIdentity.open();
    });
  }

  window.netlifyIdentity.on("init", updateIdentityUI);

  window.netlifyIdentity.on("login", function (user) {
    updateIdentityUI(user);

    // The widget re-fires "login" on things like a background token refresh,
    // not just an interactive sign-in — only navigate if this login came from
    // our own login button (which sets this flag before opening the modal).
    // Without this guard, landing on /members/ with an existing session can
    // redirect to /members/ again and again, which looks like a page stuck
    // reloading/flashing.
    var redirectTo = sessionStorage.getItem("gps-members-redirect");
    if (!redirectTo) return;
    sessionStorage.removeItem("gps-members-redirect");
    window.netlifyIdentity.close();
    if (window.location.pathname !== redirectTo) {
      // Our Edge Function checks the nf_jwt cookie set above against
      // /members/*, so send the browser on a fresh request to the target
      // page rather than relying on any client-side view of the content.
      window.location.href = redirectTo;
    }
  });

  window.netlifyIdentity.on("logout", function () {
    updateIdentityUI(null);
    window.location.href = "/";
  });

  document.addEventListener("DOMContentLoaded", function () {
    updateIdentityUI(window.netlifyIdentity.currentUser());
  });

  document.addEventListener("click", function (e) {
    var el = e.target.closest("[data-identity-action]");
    if (!el) return;
    e.preventDefault();
    var action = el.getAttribute("data-identity-action");
    if (action === "login") {
      var redirectTo = el.getAttribute("data-identity-redirect") || "/members/";
      // If there's already a valid session, opening "login" just shows the
      // account panel ("Logged in as ...") instead of a login form — no
      // "login" event fires, so nothing would otherwise happen. Skip the
      // widget entirely and go straight to the destination.
      if (window.netlifyIdentity.currentUser()) {
        window.location.href = redirectTo;
        return;
      }
      sessionStorage.setItem("gps-members-redirect", redirectTo);
      window.netlifyIdentity.open("login");
    } else if (action === "logout") {
      window.netlifyIdentity.logout();
    } else if (action === "account") {
      window.netlifyIdentity.open();
    }
  });
})();
</script>
